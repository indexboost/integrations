name: Publish PHP package (Packagist)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "laravel/v*"   # e.g. laravel/v1.2.3

jobs:
  test:
    name: PHP Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none

      - name: Install dependencies
        working-directory: laravel
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        working-directory: laravel
        run: vendor/bin/phpunit

  publish:
    name: Notify Packagist — indexboost/laravel ${{ github.ref_name }}
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version from tag
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "version=${TAG#*/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version in composer.json
        working-directory: laravel
        run: |
          # Requires jq
          jq ".version = \"${{ steps.ver.outputs.version }}\"" composer.json > composer.tmp.json
          mv composer.tmp.json composer.json

      # Packagist auto-updates when you push a tag to the linked GitHub repo.
      # The webhook below manually triggers Packagist in case auto-update is not configured.
      - name: Trigger Packagist webhook
        run: |
          curl -sX POST \
            "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_TOKEN }}" \
            -d '{"repository":{"url":"https://github.com/indexboost/integrations"}}'
