name: Publish Ruby gem (RubyGems)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 1.0.0)"
        required: true
        default: "1.0.0"
  push:
    tags:
      - "rails/v*"   # e.g. rails/v1.2.3

jobs:
  publish:
    name: Publish indexboost-rails ${{ github.ref_name }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Resolve version from tag
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            TAG="${GITHUB_REF_NAME}"
            echo "version=${TAG#*/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set version in gemspec
        working-directory: rails
        run: |
          sed -i "s/spec.version\s*=\s*\".*\"/spec.version = \"${{ steps.ver.outputs.version }}\"/" indexboost-rails.gemspec

      - name: Build gem
        working-directory: rails
        run: gem build indexboost-rails.gemspec

      - name: Configure RubyGems credentials
        run: |
          mkdir -p ~/.gem
          cat > ~/.gem/credentials << EOF
          ---
          :rubygems_api_key: ${{ secrets.RUBYGEMS_API_KEY }}
          EOF
          chmod 0600 ~/.gem/credentials

      - name: Push to RubyGems
        working-directory: rails
        run: gem push indexboost-rails-${{ steps.ver.outputs.version }}.gem
