name: Publish npm packages

on:
  push:
    tags:
      - "node/v*"       # e.g. node/v1.2.3  → publishes @indexboost/node
      - "next/v*"       # e.g. next/v1.2.3  → publishes @indexboost/next
      - "nuxt/v*"       # e.g. nuxt/v1.2.3  → publishes @indexboost/nuxt

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      # ── Determine which package to publish ─────────────────────────────────
      - name: Resolve package directory
        id: pkg
        run: |
          TAG="${GITHUB_REF_NAME}"   # e.g. "node/v1.2.3"
          PKG="${TAG%%/v*}"          # "node"
          VERSION="${TAG#*/v}"       # "1.2.3"
          case "$PKG" in
            node) DIR="express" ;;
            next) DIR="nextjs" ;;
            nuxt) DIR="nuxt" ;;
            *)
              echo "Unknown package prefix: $PKG"
              exit 1
              ;;
          esac
          echo "dir=$DIR" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "name=$PKG" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm ci

      # Patch the version in package.json to match the tag
      - name: Set version
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm version "${{ steps.pkg.outputs.version }}" --no-git-tag-version

      - name: Build
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm run build

      - name: Publish to npm
        working-directory: ${{ steps.pkg.outputs.dir }}
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
