# IndexBoost Render — Nginx config for Docker sidecar
# (used by docker-compose.yml — token injected via envsubst)

map $http_user_agent $ib_render {
    default                     0;
    "~*googlebot"               1;
    "~*bingbot"                 1;
    "~*gptbot"                  1;
    "~*claudebot"               1;
    "~*perplexitybot"           1;
    "~*duckduckbot"             1;
    "~*slurp"                   1;
    "~*naverbot"                1;
    "~*yandexbot"               1;
    "~*baiduspider"             1;
    "~*facebookexternalhit"     1;
    "~*twitterbot"              1;
    "~*linkedinbot"             1;
    "~*whatsapp"                1;
    "~*telegrambot"             1;
    "~*applebot"                1;
    "~*rogerbot"                1;
    "~*semrushbot"              1;
    "~*ahrefsbot"               1;
    "~*bytespider"              1;
    "~*mj12bot"                 1;
    "~*pinterestbot"            1;
}

upstream app {
    server app:3000;
    keepalive 32;
}

server {
    listen 80;

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|otf|pdf|zip|xml|map|txt|json)$ {
        proxy_pass http://app;
        proxy_set_header Host $host;
    }

    location / {
        if ($ib_render = 1) {
            rewrite ^(.*)$ /_ib_render last;
        }

        proxy_pass              http://app;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade     $http_upgrade;
        proxy_set_header        Connection  "upgrade";
        proxy_set_header        Host        $host;
        proxy_set_header        X-Real-IP   $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
    }

    location /_ib_render {
        internal;
        set $full_url "$scheme://$http_host$request_uri";
        proxy_pass          https://render.getindexboost.com/?url=$full_url;
        proxy_set_header    X-INDEXBOOST-TOKEN    "${INDEXBOOST_TOKEN}";
        proxy_set_header    Host                render.getindexboost.com;
        proxy_ssl_server_name on;
        proxy_read_timeout  60s;
        proxy_hide_header   Set-Cookie;
    }
}
