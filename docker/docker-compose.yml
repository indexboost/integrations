# IndexBoost Prerender — Docker Compose example
#
# Adds IndexBoost-aware Nginx as a reverse proxy sidecar in front of
# your existing application container.
#
# Usage:
#   1. Copy this file (or merge into your existing docker-compose.yml)
#   2. Replace "your-app-image" with your Docker image
#   3. Set INDEXBOOST_TOKEN in a .env file or your CI/CD secrets
#   4. Run: docker compose up -d

version: "3.9"

services:
  # ── Your application ──────────────────────────────────────────────────────
  app:
    image: your-app-image:latest
    # The app runs on port 3000 internally; NOT exposed to the host
    expose:
      - "3000"
    environment:
      NODE_ENV: production
    restart: unless-stopped

  # ── IndexBoost Nginx sidecar ──────────────────────────────────────────────
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    environment:
      # Passed via envsubst — see nginx-docker.conf
      INDEXBOOST_TOKEN: "${INDEXBOOST_TOKEN}"
    depends_on:
      - app
    restart: unless-stopped
    # Use envsubst to inject the token at container startup
    command: >
      /bin/sh -c
      "envsubst '$$INDEXBOOST_TOKEN' < /etc/nginx/conf.d/default.conf > /tmp/default.conf
      && cp /tmp/default.conf /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"
