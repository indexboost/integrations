# IndexBoost Render — Nginx config for PHP applications (WordPress, Laravel, Symfony, etc.)
#
# How it works:
#   1. Nginx serves PHP via FastCGI (PHP-FPM)
#   2. Crawlers are intercepted BEFORE reaching PHP
#   3. Crawler requests are proxied to render.getindexboost.com
#   4. Regular users go through PHP-FPM as normal
#
# Replace:
#   YOUR_INDEXBOOST_TOKEN  → your token from app.getindexboost.com/sites → Render Tokens
#   example.com            → your domain
#   /var/www/html          → your document root
#   unix:/run/php/php8.2-fpm.sock → your PHP-FPM socket path

map $http_user_agent $ib_render {
    default                     0;
    "~*googlebot"               1;
    "~*bingbot"                 1;
    "~*gptbot"                  1;
    "~*claudebot"               1;
    "~*perplexitybot"           1;
    "~*duckduckbot"             1;
    "~*slurp"                   1;
    "~*naverbot"                1;
    "~*yandexbot"               1;
    "~*baiduspider"             1;
    "~*facebookexternalhit"     1;
    "~*twitterbot"              1;
    "~*linkedinbot"             1;
    "~*whatsapp"                1;
    "~*telegrambot"             1;
    "~*applebot"                1;
    "~*rogerbot"                1;
    "~*semrushbot"              1;
    "~*ahrefsbot"               1;
    "~*bytespider"              1;
    "~*mj12bot"                 1;
    "~*pinterestbot"            1;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    root /var/www/html;
    index index.php index.html;

    # Static assets — never render
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|otf|pdf|zip|xml|map|txt)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location / {
        # Crawlers → render (before PHP hits)
        if ($ib_render = 1) {
            rewrite ^(.*)$ /_ib_render last;
        }

        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # Internal render proxy
    location /_ib_render {
        internal;

        set $full_url "$scheme://$http_host$request_uri";

        proxy_pass          https://render.getindexboost.com/?url=$full_url;
        proxy_set_header    X-INDEXBOOST-TOKEN    "YOUR_INDEXBOOST_TOKEN";
        proxy_set_header    Host                render.getindexboost.com;
        proxy_set_header    X-Forwarded-For     $remote_addr;
        proxy_ssl_server_name on;

        proxy_connect_timeout   10s;
        proxy_read_timeout      60s;

        proxy_hide_header       Set-Cookie;
    }
}
