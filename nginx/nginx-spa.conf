# IndexBoost Render — Nginx config for Single Page Applications (React, Vue, Angular, Svelte)
#
# How it works:
#   1. The `map` block detects crawler User-Agents and sets $ib_render = 1
#   2. For crawlers, the request is internally rewritten to /_ib_render
#   3. /_ib_render proxies to render.getindexboost.com with the token header
#
# Requirements:
#   - Nginx 1.14+
#   - nginx-mod-http-headers-more (optional, for better header control)
#
# Replace:
#   YOUR_INDEXBOOST_TOKEN  → your token from app.getindexboost.com/sites → Render Tokens
#   example.com            → your domain

map $http_user_agent $ib_render {
    default                     0;
    "~*googlebot"               1;
    "~*bingbot"                 1;
    "~*gptbot"                  1;
    "~*claudebot"               1;
    "~*perplexitybot"           1;
    "~*duckduckbot"             1;
    "~*slurp"                   1;
    "~*naverbot"                1;
    "~*yandexbot"               1;
    "~*baiduspider"             1;
    "~*facebookexternalhit"     1;
    "~*twitterbot"              1;
    "~*linkedinbot"             1;
    "~*whatsapp"                1;
    "~*telegrambot"             1;
    "~*applebot"                1;
    "~*rogerbot"                1;
    "~*semrushbot"              1;
    "~*ahrefsbot"               1;
    "~*bytespider"              1;
    "~*mj12bot"                 1;
    "~*pinterestbot"            1;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;
    root /var/www/html;
    index index.html;

    # Static assets — never render
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|otf|pdf|zip|xml|map|txt|json)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        # Crawlers → render
        if ($ib_render = 1) {
            rewrite ^(.*)$ /_ib_render last;
        }

        # Normal users → serve SPA
        try_files $uri $uri/ /index.html;
    }

    # Internal render proxy — never exposed to end users
    location /_ib_render {
        internal;

        set $full_url "$scheme://$http_host$request_uri";

        proxy_pass          https://render.getindexboost.com/?url=$full_url;
        proxy_set_header    X-INDEXBOOST-TOKEN    "YOUR_INDEXBOOST_TOKEN";
        proxy_set_header    Host                render.getindexboost.com;
        proxy_set_header    X-Forwarded-For     $remote_addr;
        proxy_ssl_server_name on;

        # Timeouts — render can take a few seconds
        proxy_connect_timeout   10s;
        proxy_read_timeout      60s;

        # Don't pass cookies from the render service back to the crawler
        proxy_hide_header       Set-Cookie;
    }
}
