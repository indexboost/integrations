# IndexBoost Render — Nginx as Reverse Proxy
#
# Use this when Nginx acts as a reverse proxy in front of another server
# (Node.js, Python, Ruby, Java, etc.).
#
# How it works:
#   1. Nginx proxies traffic to an upstream backend (e.g. :3000)
#   2. Crawlers are intercepted BEFORE hitting the backend
#   3. Crawler requests go to render.getindexboost.com
#   4. Regular users reach the backend normally
#
# Replace:
#   YOUR_INDEXBOOST_TOKEN  → your token from app.getindexboost.com/sites → Render Tokens
#   example.com            → your domain
#   localhost:3000         → your backend address

map $http_user_agent $ib_render {
    default                     0;
    "~*googlebot"               1;
    "~*bingbot"                 1;
    "~*gptbot"                  1;
    "~*claudebot"               1;
    "~*perplexitybot"           1;
    "~*duckduckbot"             1;
    "~*slurp"                   1;
    "~*naverbot"                1;
    "~*yandexbot"               1;
    "~*baiduspider"             1;
    "~*facebookexternalhit"     1;
    "~*twitterbot"              1;
    "~*linkedinbot"             1;
    "~*whatsapp"                1;
    "~*telegrambot"             1;
    "~*applebot"                1;
    "~*rogerbot"                1;
    "~*semrushbot"              1;
    "~*ahrefsbot"               1;
    "~*bytespider"              1;
    "~*mj12bot"                 1;
    "~*pinterestbot"            1;
}

upstream backend {
    server localhost:3000;
    keepalive 64;
}

server {
    listen 80;
    listen [::]:80;
    server_name example.com www.example.com;

    # Static assets — skip render, serve from backend directly
    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|otf|pdf|zip|xml|map|txt|json)$ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
        # Crawlers → render
        if ($ib_render = 1) {
            rewrite ^(.*)$ /_ib_render last;
        }

        # Regular users → backend
        proxy_pass              http://backend;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade     $http_upgrade;
        proxy_set_header        Connection  "upgrade";
        proxy_set_header        Host        $host;
        proxy_set_header        X-Real-IP   $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_cache_bypass      $http_upgrade;
    }

    # Internal render proxy
    location /_ib_render {
        internal;

        set $full_url "$scheme://$http_host$request_uri";

        proxy_pass          https://render.getindexboost.com/?url=$full_url;
        proxy_set_header    X-INDEXBOOST-TOKEN    "YOUR_INDEXBOOST_TOKEN";
        proxy_set_header    Host                render.getindexboost.com;
        proxy_set_header    X-Forwarded-For     $remote_addr;
        proxy_ssl_server_name on;

        proxy_connect_timeout   10s;
        proxy_read_timeout      60s;

        proxy_hide_header       Set-Cookie;
    }
}
