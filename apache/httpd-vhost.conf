# IndexBoost Render — Apache VirtualHost config
#
# Use this when you have access to the Apache server config (httpd.conf or
# sites-available/). This is more reliable than .htaccess and does not require
# AllowOverride.
#
# Requirements:
#   - mod_rewrite, mod_proxy, mod_proxy_http, mod_headers, mod_ssl
#
# Replace:
#   YOUR_INDEXBOOST_TOKEN  → your token from app.getindexboost.com
#   example.com            → your domain
#   /var/www/html          → your document root

<VirtualHost *:80>
    ServerName example.com
    ServerAlias www.example.com
    DocumentRoot /var/www/html

    # ── Enable required modules ───────────────────────────────────────────────
    # Make sure the following are loaded in httpd.conf or mods-enabled/:
    #   LoadModule rewrite_module modules/mod_rewrite.so
    #   LoadModule proxy_module modules/mod_proxy.so
    #   LoadModule proxy_http_module modules/mod_proxy_http.so
    #   LoadModule headers_module modules/mod_headers.so

    SSLProxyEngine On
    ProxyPreserveHost Off

    <Directory /var/www/html>
        AllowOverride None
        Options -Indexes +FollowSymLinks
        Require all granted

        RewriteEngine On

        # Skip static assets
        RewriteRule \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|otf|pdf|zip|xml|map|txt|json|csv|gz|br)$ - [L]

        # Detect crawlers
        RewriteCond %{HTTP_USER_AGENT} (googlebot|bingbot|gptbot|claudebot|perplexitybot|duckduckbot|slurp|naverbot|yandexbot|baiduspider|facebookexternalhit|twitterbot|linkedinbot|whatsapp|telegrambot|applebot|rogerbot|semrushbot|ahrefsbot|bytespider|dotbot|mj12bot|pinterestbot) [NC]
        RewriteRule ^ - [E=RENDER:true]

        # Proxy crawlers to render service
        RewriteCond %{ENV:RENDER} true
        RewriteRule ^(.*)$ https://render.getindexboost.com/?url=%{REQUEST_SCHEME}://%{HTTP_HOST}%{REQUEST_URI} [P,L]

        # Set token header
        RequestHeader set X-INDEXBOOST-TOKEN "YOUR_INDEXBOOST_TOKEN" env=RENDER

        # SPA fallback for regular users
        RewriteCond %{REQUEST_FILENAME} !-f
        RewriteCond %{REQUEST_FILENAME} !-d
        RewriteRule ^ /index.html [L]
    </Directory>
</VirtualHost>
