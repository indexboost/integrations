# IndexBoost Render — HAProxy Configuration
#
# Intercepts crawler requests at the load balancer level, before they
# reach any backend server.
#
# HAProxy version: 2.4+
#
# Replace:
#   YOUR_INDEXBOOST_TOKEN  → your token from app.getindexboost.com
#   your-backend-server    → your backend IP or hostname
#   3000                   → your backend port

global
    log stdout format raw local0 info

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5s
    timeout client  60s
    timeout server  60s

# ── Frontend — receives incoming traffic ──────────────────────────────────────
frontend www
    bind *:80

    # ACL: match known crawler user-agents
    acl is_crawler hdr_reg(User-Agent) -i (googlebot|bingbot|gptbot|claudebot|perplexitybot|duckduckbot|slurp|naverbot|yandexbot|baiduspider|facebookexternalhit|twitterbot|linkedinbot|whatsapp|telegrambot|applebot|rogerbot|semrushbot|ahrefsbot|bytespider|dotbot|mj12bot|pinterestbot)

    # ACL: skip static asset extensions
    acl is_static path_reg -i \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot|otf|pdf|zip|xml|map|txt|json|csv|gz|br)$

    # Route crawlers (unless it's a static file) to the render backend
    use_backend indexboost_render if is_crawler !is_static

    # All other requests go to your app backend
    default_backend webapp

# ── Backend: your application ─────────────────────────────────────────────────
backend webapp
    balance roundrobin
    server app1 your-backend-server:3000 check

# ── Backend: IndexBoost render service ───────────────────────────────────────
backend indexboost_render
    # Rewrite the request URL to include the original URL as a query param
    # and append the token header
    http-request set-path /?url=%[req.hdr(x-forwarded-proto),default(http)]://%[req.hdr(host)]%[path]%[query,regsub(^,.+$,?&)]

    http-request set-header X-INDEXBOOST-TOKEN YOUR_INDEXBOOST_TOKEN
    http-request set-header Host render.getindexboost.com

    server render1 render.getindexboost.com:443 ssl verify none check
